    <!-- ant march pauser -->
    <script>
    const scrollTrack = document.querySelector('.scroll-track');

    scrollTrack.addEventListener('touchstart', () => {
    scrollTrack.style.animationPlayState = 'paused';
    });

    scrollTrack.addEventListener('touchend', () => {
    scrollTrack.style.animationPlayState = 'running';
    });
    </script>

    <!-- script for toggling the nav menu when swelling socials -->
    <script>
        function toggleMenu() {
            const menu = document.getElementById("menu");
            menu.classList.toggle("active");
        }
        // Close menu when any navigation link is clicked
        document.querySelectorAll("#menu a").forEach(link => {
            link.addEventListener("click", () => {
            const menu = document.getElementById("menu");
            menu.classList.remove("active");
            });
        });
    </script>

    <!-- script to click anywhere to close, for social swell -->
    <script>
        const trigger = document.getElementById("contact-trigger");
        const headerBox = document.querySelector(".header-box");

        trigger.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopPropagation(); // prevent immediate close
        headerBox.classList.toggle("contact-active");
        });

        // Click anywhere else closes it
        document.addEventListener("click", function(e) {
        if (!headerBox.contains(e.target)) {
            headerBox.classList.remove("contact-active");
        }
        });
    </script>
